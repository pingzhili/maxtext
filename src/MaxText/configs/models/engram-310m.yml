# Engram 310M model config
# Replicates Megatron-LM train_310m_engram.sh configuration
# Architecture: MLA + MoE (48 experts, top-6) + Engram at layers [1, 10]
# ~310M active parameters, ~1.9B total parameters
#
# Target global_batch_size = 512. Set per_device_batch_size and
# gradient_accumulation_steps at runtime based on your device count:
#   global_batch = per_device_batch_size * num_devices * gradient_accumulation_steps
#
# Example command:
# python3 -m maxtext.trainers.pre_train.train src/maxtext/configs/base.yml \
#   base_output_directory=${BASE_OUTPUT_PATH} run_name=engram-310m \
#   model_name=engram-310m scan_layers=True attention=flash \
#   per_device_batch_size=8 max_target_length=2048 \
#   dtype=bfloat16 weight_dtype=bfloat16 \
#   tokenizer_type=huggingface tokenizer_path=allenai/OLMo-2-0425-1B

# Core architecture
base_emb_dim: 1024
base_num_query_heads: 16
base_num_kv_heads: 16
base_mlp_dim: 3072
base_moe_mlp_dim: 384
base_num_decoder_layers: 22
first_num_dense_layers: 1
decoder_block: "deepseek"
mlp_activations: ["silu", "linear"]
enable_dropout: False
logits_via_embedding: False
normalization_layer_epsilon: 1.0e-5

# Vocabulary and tokenizer
vocab_size: 100352
tokenizer_type: "huggingface"
tokenizer_path: "allenai/OLMo-2-0425-1B"

# Weight initialization (align with Megatron-LM default --init-method-std 0.02)
init_method_std: 0.02

# MLA attention
attention_type: "mla"
q_lora_rank: 256
kv_lora_rank: 256
qk_nope_head_dim: 128
qk_rope_head_dim: 64
v_head_dim: 128

# MoE
num_experts: 48
num_experts_per_tok: 6
shared_experts: 2
routed_score_func: "sigmoid"
routed_bias: True
routed_scaling_factor: 1.0
load_balance_loss_weight: 0.0

# RoPE (standard, no YaRN)
rope_type: "default"
rope_max_timescale: 10_000
max_position_embeddings: 2048

# No MHC, no Indexer
mhc_expansion_rate: 1
use_indexer: False

# Engram
engram_layers: [1, 10]
engram_num_heads: 8
engram_head_dim: 32
engram_vocab_bases: [385000, 385000]
engram_max_ngram_size: 3
engram_kernel_size: 4
engram_seed: 0
engram_pad_id: 100277
engram_lr_mult: 5.0
engram_wd_mult: 0.0

# Training hyperparameters
learning_rate: 6.e-4
learning_rate_final_fraction: 0.1
warmup_steps_fraction: 0.04
lr_schedule_type: "cosine"
opt_type: "adamw"
adam_b1: 0.9
adam_b2: 0.95
adam_weight_decay: 0.1
gradient_clipping_threshold: 1.0
steps: 35_000
